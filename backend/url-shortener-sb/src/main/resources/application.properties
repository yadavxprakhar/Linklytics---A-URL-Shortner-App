spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortener
spring.datasource.username=prakhar
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HS256: plain UTF-8 string, minimum 32 bytes (jjwt weak-key validation). Rotate in production (env var recommended).
jwt.secret=lynkforge-dev-jwt-hmac-secret-at-least-thirty-two-bytes-long
jwt.expiration=172800000

frontend.url=http://localhost:5173

# Logs (optional but useful)
logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE